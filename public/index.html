<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- ÚNICO meta viewport — garante 1:1 em mobile e desktop -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Deu Mico</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;700&display=swap" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/menu.css" />
    <link rel="stylesheet" href="css/phase3.css" />
    <link rel="stylesheet" href="css/game-table.css" />
    <link rel="stylesheet" href="css/hex-table.css" />
    <link rel="stylesheet" href="css/card-deck-pile.css" />
    <link rel="stylesheet" href="css/deck-shuffle.css" />
    <link rel="stylesheet" href="css/deck-action-panel.css" />
  </head>
  <body>
    <div id="app"></div>

    <!-- Entry point: apenas App.bootstrap() inicia o sistema -->
    <script type="module" src="js/core/App.js"></script>

    <!-- DEBUG util (somente dev) — remover em produção -->
    <script>
      (function debugViewport() {
        const html = document.documentElement;
        const cs   = getComputedStyle(html);
        console.groupCollapsed('[DEBUG] Viewport & Scale');
        console.log('devicePixelRatio :', window.devicePixelRatio);
        console.log('innerWidth       :', window.innerWidth);
        console.log('innerHeight      :', window.innerHeight);
        console.log('html font-size   :', cs.fontSize);
        console.log('html zoom        :', cs.zoom ?? 'n/a');
        console.log('html transform   :', cs.transform);
        console.groupEnd();
      })();
    </script>
  </body>
</html>
