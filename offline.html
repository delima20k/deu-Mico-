<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sem conexão — Deu Mico</title>
    <meta name="theme-color" content="#e63946" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: #1a1a2e;
        color: #f1f1f1;
        font-family: system-ui, sans-serif;
        padding: 2rem;
        text-align: center;
      }

      img {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        object-fit: cover;
        opacity: 0.85;
      }

      h1 { font-size: 1.6rem; color: #e63946; }

      p  { font-size: 1rem; color: #aaa; max-width: 320px; line-height: 1.5; }

      button {
        margin-top: 0.5rem;
        padding: 0.75rem 2rem;
        background: #e63946;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: 600;
      }

      button:active { opacity: 0.8; }
    </style>
  </head>
  <body>
    <img src="/img/carta_logo.png" alt="Deu Mico" />
    <h1>Sem conexão</h1>
    <p>Verifique sua internet e tente novamente. O jogo precisa de conexão para funcionar.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </body>
</html>
