<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- ÚNICO meta viewport — garante 1:1 em mobile e desktop -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Deu Mico</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#e63946" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Deu Mico" />
    <link rel="apple-touch-icon" href="img/carta_logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;700&display=swap" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/menu.css" />
    <link rel="stylesheet" href="css/phase3.css" />
    <link rel="stylesheet" href="css/game-table.css" />
    <link rel="stylesheet" href="css/hex-table.css" />
    <link rel="stylesheet" href="css/card-deck-pile.css" />
    <link rel="stylesheet" href="css/deck-deal.css" />
    <link rel="stylesheet" href="css/deck-shuffle.css" />
    <link rel="stylesheet" href="css/deck-action-panel.css" />
    <link rel="stylesheet" href="css/hand-modal.css" />
  </head>
  <body>
    <div id="app"></div>

    <!-- Entry point: apenas App.bootstrap() inicia o sistema -->
    <script type="module" src="js/core/App.js"></script>

    <!-- Registro do Service Worker (PWA) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => {
            console.warn('[SW] Falha ao registrar service worker:', err);
          });
        });
      }
    </script>

  </body>
</html>
