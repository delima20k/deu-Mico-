<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- ÚNICO meta viewport — garante 1:1 em mobile e desktop -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Deu Mico</title>
    <meta name="description" content="Jogo de cartas Deu Mico — multiplayer online, recomendado a partir de 6 anos!" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="img/carta_logo.png" />
    <link rel="shortcut icon" href="img/carta_logo.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1FA34A" />
    <meta name="color-scheme" content="light" />
    <meta name="application-name" content="Deu Mico" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DeuMico" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- Windows / Edge pinned site -->
    <meta name="msapplication-TileColor" content="#1a1a2e" />
    <meta name="msapplication-TileImage" content="img/carta_logo.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Deu Mico" />
    <meta property="og:description" content="Jogo de cartas Deu Mico — multiplayer online!" />
    <meta property="og:image" content="img/logoMarca.png" />
    <meta property="og:type" content="website" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Deu Mico" />
    <meta name="twitter:description" content="Jogo de cartas Deu Mico — multiplayer online!" />
    <meta name="twitter:image" content="img/logoMarca.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;700&display=swap" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/menu.css" />
    <link rel="stylesheet" href="css/phase3.css" />
    <link rel="stylesheet" href="css/game-table.css" />
    <link rel="stylesheet" href="css/hex-table.css" />
    <link rel="stylesheet" href="css/card-deck-pile.css" />
    <link rel="stylesheet" href="css/deck-deal.css" />
    <link rel="stylesheet" href="css/deck-shuffle.css" />
    <link rel="stylesheet" href="css/deck-action-panel.css" />
    <link rel="stylesheet" href="css/hand-modal.css" />
    <link rel="stylesheet" href="css/chat.css" />
    <link rel="stylesheet" href="css/ads.css" />
  </head>
  <body>
    <div id="app"></div>

    <!-- Entry point: apenas App.bootstrap() inicia o sistema -->
    <script type="module" src="js/core/App.js"></script>

    <!-- Registro do Service Worker (PWA) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[SW] Registrado:', reg.scope))
            .catch(err => console.error('[SW] Erro ao registrar:', err));
        });
      }
    </script>

  </body>
</html>
